name: Build Lucky APK

on:
  push:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lucky-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64_generic, arm_cortex-a7_neon-vfpv4, mips_24kc, mipsel_24kc, i386_pentium4]
        include:
          - arch: x86_64
            core_arch: x86_64
          - arch: aarch64_generic
            core_arch: arm64
          - arch: arm_cortex-a7_neon-vfpv4
            core_arch: armv7
          - arch: mips_24kc
            core_arch: mips_softfloat
          - arch: mipsel_24kc
            core_arch: mipsle_softfloat
          - arch: i386_pentium4
            core_arch: i386
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      core_arch: ${{ steps.meta.outputs.core_arch }}
      upstream_version: ${{ steps.meta.outputs.upstream_version }}
      release_url: ${{ steps.meta.outputs.release_url }}
      source_url: ${{ steps.meta.outputs.source_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare latest Lucky core
        shell: bash
        env:
          LUCKY_CORE_ARCH: ${{ matrix.core_arch }}
        run: bash scripts/prepare-latest-lucky.sh

      - name: Export release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source .lucky-release.env
          {
            echo "version=${PKG_VERSION}"
            echo "tag=lucky-${PKG_VERSION}"
            echo "core_arch=${LUCKY_CORE_ARCH}"
            echo "upstream_version=${LUCKY_UPSTREAM_VERSION}"
            echo "release_url=${LUCKY_RELEASE_ROOT}/${LUCKY_RELEASE_DIR}/"
            echo "source_url=${LUCKY_SOURCE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Build packages
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: lucky
          PACKAGES: lucky luci-app-lucky

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp -v .lucky-release.env artifacts/
          
          arch="${{ matrix.arch }}"
          # 创建基于架构的子目录，并在上传artifact时保留结构
          mkdir -p "artifacts/$arch"
          
          find bin -type f \( \
            -name "lucky-*.apk" -o \
            -name "luci-app-lucky-*.apk" -o \
            -name "luci-i18n-lucky-zh-cn-*.apk" \
          \) -print -exec cp -v {} "artifacts/$arch/" \;
          
          for apk in artifacts/$arch/*.apk; do
            name="$(basename "$apk")"
            clean_name="$(printf '%s' "$name" | sed -E 's/-r[0-9]+(\.apk)$/\1/')"
            
            [ "$name" = "$clean_name" ] || mv -v "$apk" "artifacts/$arch/$clean_name"
          done
          test -n "$(find artifacts -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-${{ matrix.arch }}-apk
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-upload
          pattern: lucky-*-apk
          merge-multiple: true

      - name: Archive architecture folders
        shell: bash
        run: |
          set -euo pipefail
          cd release-upload
          for dir in */ ; do
            # Remove trailing slash
            arch_dir="${dir%/}"
            if [ -d "$arch_dir" ]; then
              echo "Zipping architecture: $arch_dir"
              zip -r "lucky-${{ needs.build.outputs.version }}-${arch_dir}.zip" "$arch_dir"
              # Optional: You can remove the original apk files if you only want to release the zip
              # rm -rf "$arch_dir"
            fi
          done

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Lucky ${{ needs.build.outputs.version }}"
            echo
            echo "lucky 包已内置对应架构的 Lucky 核心，安装或启动时不会再下载核心。"
            echo "核心来源: ${{ needs.build.outputs.release_url }}"
            echo
            echo "请从 SSH 安装，不要使用 LuCI 上传软件包入口："
            echo
            echo '```sh'
            echo 'apk add --allow-untrusted ./lucky-*.apk ./luci-app-lucky-*.apk ./luci-i18n-lucky-zh-cn-*.apk'
            echo '/etc/init.d/rpcd reload'
            echo '/etc/init.d/uhttpd reload'
            echo '/etc/init.d/lucky restart'
            echo '```'
            echo
            echo "LuCI 上传软件包入口执行 apk add 时不会带 --allow-untrusted，第三方未信任签名包会报 UNTRUSTED signature。"
            echo
            echo "Files:"
            find release-upload -type f -name "*.zip" -printf "- %f\n" | sort
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.tag }}
          RELEASE_NAME: Lucky ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-upload/*.zip)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Zip files found for release"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md
            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$TAG_NAME" "$asset" --yes
            done < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name | select(endswith(".zip"))')
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            prerelease_args=()
            if [[ "$TAG_NAME" == *beta* || "$TAG_NAME" == *alpha* || "$TAG_NAME" == *rc* ]]; then
              prerelease_args=(--prerelease)
            fi
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
