name: Build Lucky APK

on:
  push:
    paths:
      - "lucky/Makefile"
      - "luci-app-lucky/Makefile"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "lucky/Makefile"
      - "luci-app-lucky/Makefile"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
    inputs:
      arch:
        description: Build only one arch, or all
        required: false
        default: all
        type: choice
        options:
          - all
          - x86_64
          - i386_pentium4
          - aarch64_cortex-a53
          - arm_cortex-a7_neon-vfpv4
          - mips_24kc
          - mipsel_24kc
          - riscv64_riscv64

permissions:
  contents: write

concurrency:
  group: lucky-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        arch:
          - x86_64
          - i386_pentium4
          - aarch64_cortex-a53
          - arm_cortex-a7_neon-vfpv4
          - mips_24kc
          - mipsel_24kc
          - riscv64_riscv64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip unmatched manual arch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.arch != 'all' && github.event.inputs.arch != matrix.arch
        run: echo "Skip ${{ matrix.arch }}"

      - name: Build packages
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.arch == 'all' || github.event.inputs.arch == matrix.arch
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: lucky
          PACKAGES: lucky luci-app-lucky

      - name: Collect APK files
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.arch == 'all' || github.event.inputs.arch == matrix.arch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/${{ matrix.arch }}
          find bin -type f -name "*.apk" -print -exec cp -v {} artifacts/${{ matrix.arch }}/ \;
          test -n "$(find artifacts/${{ matrix.arch }} -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.arch == 'all' || github.event.inputs.arch == matrix.arch
        uses: actions/upload-artifact@v4
        with:
          name: lucky-apk-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/*.apk
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F ':=' '/^PKG_VERSION:=/ { print $2; exit }' lucky/Makefile)"
          release_dir="$(awk -F ':=' '/^LUCKY_RELEASE_DIR:=/ { print $2; exit }' lucky/Makefile)"
          if [ -z "$version" ]; then
            echo "Cannot read PKG_VERSION from lucky/Makefile"
            exit 1
          fi
          if [ -z "$release_dir" ]; then
            echo "Cannot read LUCKY_RELEASE_DIR from lucky/Makefile"
            exit 1
          fi
          tag="lucky-${version}"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_url=https://release.66666.host/${release_dir}/"
          } >> "$GITHUB_OUTPUT"

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lucky-apk-*
          path: release-assets

      - name: Normalize release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          find release-assets -type f -name "*.apk" -print0 | while IFS= read -r -d '' file; do
            artifact="$(basename "$(dirname "$file")")"
            arch="${artifact#lucky-apk-}"
            cp -v "$file" "release-upload/${arch}-$(basename "$file")"
          done
          test -n "$(find release-upload -type f -name '*.apk' -print -quit)"

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Lucky ${{ steps.version.outputs.version }} OpenWrt APK"
            echo
            echo "Core package source: ${{ steps.version.outputs.release_url }}"
            echo
            echo "Files:"
            find release-upload -type f -name "*.apk" -printf "- %f\n" | sort
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: Lucky ${{ steps.version.outputs.version }} APK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-upload/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No APK files found for release"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            prerelease_args=()
            if [[ "$TAG_NAME" == *beta* || "$TAG_NAME" == *alpha* || "$TAG_NAME" == *rc* ]]; then
              prerelease_args=(--prerelease)
            fi
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
