name: Build Lucky APK

on:
  push:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - "scripts/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lucky-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x86_64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      core_arch: ${{ steps.meta.outputs.core_arch }}
      upstream_version: ${{ steps.meta.outputs.upstream_version }}
      release_url: ${{ steps.meta.outputs.release_url }}
      source_url: ${{ steps.meta.outputs.source_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare latest Lucky core
        shell: bash
        run: bash scripts/prepare-latest-lucky.sh

      - name: Export release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          source .lucky-release.env
          {
            echo "version=${PKG_VERSION}"
            echo "tag=lucky-${PKG_VERSION}"
            echo "core_arch=${LUCKY_CORE_ARCH}"
            echo "upstream_version=${LUCKY_UPSTREAM_VERSION}"
            echo "release_url=${LUCKY_RELEASE_ROOT}/${LUCKY_RELEASE_DIR}/"
            echo "source_url=${LUCKY_SOURCE_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Build packages
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: x86_64
          FEEDNAME: lucky
          PACKAGES: lucky luci-app-lucky

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp -v .lucky-release.env artifacts/
          find bin -type f \( \
            -name "lucky-*.apk" -o \
            -name "luci-app-lucky-*.apk" -o \
            -name "luci-i18n-lucky-zh-cn-*.apk" \
          \) -print -exec cp -v {} artifacts/ \;
          for apk in artifacts/*.apk; do
            name="$(basename "$apk")"
            clean_name="$(printf '%s' "$name" | sed -E 's/-r[0-9]+(\.apk)$/\1/')"
            [ "$name" = "$clean_name" ] || mv -v "$apk" "artifacts/$clean_name"
          done
          test -n "$(find artifacts -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-x86_64-apk
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: lucky-x86_64-apk
          path: release-upload

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Lucky ${{ needs.build.outputs.version }}"
            echo
            echo "lucky 包已内置 ${{ needs.build.outputs.core_arch }} Lucky 核心，安装或启动时不会再下载核心。"
            echo "核心来源: ${{ needs.build.outputs.source_url }}"
            echo
            echo "请从 SSH 安装，不要使用 LuCI 上传软件包入口："
            echo
            echo '```sh'
            echo 'apk add --allow-untrusted ./lucky-*.apk ./luci-app-lucky-*.apk ./luci-i18n-lucky-zh-cn-*.apk'
            echo '/etc/init.d/rpcd reload'
            echo '/etc/init.d/uhttpd reload'
            echo '/etc/init.d/lucky restart'
            echo '```'
            echo
            echo "LuCI 上传软件包入口执行 apk add 时不会带 --allow-untrusted，第三方未信任签名包会报 UNTRUSTED signature。"
            echo
            echo "Files:"
            find release-upload -type f -name "*.apk" -printf "- %f\n" | sort
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.build.outputs.tag }}
          RELEASE_NAME: Lucky ${{ needs.build.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-upload/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No APK files found for release"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md
            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "$TAG_NAME" "$asset" --yes
            done < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name | select(endswith(".apk"))')
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            prerelease_args=()
            if [[ "$TAG_NAME" == *beta* || "$TAG_NAME" == *alpha* || "$TAG_NAME" == *rc* ]]; then
              prerelease_args=(--prerelease)
            fi
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
