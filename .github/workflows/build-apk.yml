name: Build Lucky APK

on:
  push:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "lucky/**"
      - "luci-app-lucky/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lucky-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x86_64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        uses: openwrt/gh-action-sdk@v8
        env:
          ARCH: x86_64
          FEEDNAME: lucky
          PACKAGES: lucky luci-app-lucky

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find bin -type f \( \
            -name "lucky-*.apk" -o \
            -name "luci-app-lucky-*.apk" -o \
            -name "luci-i18n-lucky-zh-cn-*.apk" \
          \) -print -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -type f -name '*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-x86_64-apk
          path: artifacts/*.apk
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F ':=' '/^PKG_VERSION:=/ { print $2; exit }' lucky/Makefile)"
          release_dir="$(awk -F ':=' '/^LUCKY_RELEASE_DIR:=/ { print $2; exit }' lucky/Makefile)"
          core_arch="$(awk -F ':=' '/^LUCKY_CORE_ARCH:=/ { print $2; exit }' lucky/Makefile)"
          if [ -z "$version" ]; then
            echo "Cannot read PKG_VERSION from lucky/Makefile"
            exit 1
          fi
          if [ -z "$release_dir" ]; then
            echo "Cannot read LUCKY_RELEASE_DIR from lucky/Makefile"
            exit 1
          fi
          if [ -z "$core_arch" ]; then
            echo "Cannot read LUCKY_CORE_ARCH from lucky/Makefile"
            exit 1
          fi
          tag="lucky-${version}"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "core_arch=$core_arch"
            echo "release_url=https://release.66666.host/${release_dir}/"
          } >> "$GITHUB_OUTPUT"

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: lucky-x86_64-apk
          path: release-upload

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Lucky ${{ steps.version.outputs.version }} x86_64 OpenWrt APK"
            echo
            echo "lucky 包已内置 ${{ steps.version.outputs.core_arch }} Lucky 核心，安装或启动时不会再下载核心。"
            echo "核心来源: ${{ steps.version.outputs.release_url }}"
            echo
            echo "请从 SSH 安装，不要使用 LuCI 上传软件包入口："
            echo
            echo '```sh'
            echo 'apk add --allow-untrusted ./lucky-*.apk ./luci-app-lucky-*.apk ./luci-i18n-lucky-zh-cn-*.apk'
            echo '/etc/init.d/rpcd reload'
            echo '/etc/init.d/uhttpd reload'
            echo '/etc/init.d/lucky restart'
            echo '```'
            echo
            echo "LuCI 上传软件包入口执行 apk add 时不会带 --allow-untrusted，第三方未信任签名包会报 UNTRUSTED signature。"
            echo
            echo "Files:"
            find release-upload -type f -name "*.apk" -printf "- %f\n" | sort
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: Lucky ${{ steps.version.outputs.version }} x86_64 APK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-upload/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No APK files found for release"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_NAME" --notes-file release-notes.md
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            prerelease_args=()
            if [[ "$TAG_NAME" == *beta* || "$TAG_NAME" == *alpha* || "$TAG_NAME" == *rc* ]]; then
              prerelease_args=(--prerelease)
            fi
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi
