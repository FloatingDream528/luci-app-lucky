<style>
	/* 现代化 LuCI 样式覆写与补充 */
	.lucky-status-panel {
		margin-bottom: 20px;
	}
	.lucky-badge {
		padding: 2px 8px;
		border-radius: 3px;
		font-weight: bold;
		font-size: 0.9em;
		color: #fff;
		display: inline-block;
		margin-right: 10px;
	}
	.lucky-badge.success { background-color: #28a745; }
	.lucky-badge.danger { background-color: #dc3545; }
	.lucky-badge.warning { background-color: #ffc107; color: #333; }
	.lucky-badge.secondary { background-color: #6c757d; }
	
	.lucky-val-text {
		font-weight: bold;
		color: #0069d9;
		margin-right: 10px;
	}
	
	.lucky-admin-link {
		font-size: 1.1em;
		font-weight: bold;
		text-decoration: none;
		color: #0056b3;
		padding: 5px 10px;
		border: 1px solid #b8daff;
		background-color: #cce5ff;
		border-radius: 4px;
		display: inline-block;
		transition: all 0.2s;
	}
	.lucky-admin-link:hover {
		background-color: #b8daff;
		text-decoration: none;
	}
	
	.lucky-action-group {
		margin-top: 5px;
	}
</style>

<div class="cbi-section lucky-status-panel">
	<h3><%:Main Program Information%></h3>
	
	<div class="cbi-value">
		<label class="cbi-value-title"><%:Installation Status%></label>
		<div class="cbi-value-field" id="ui-install-status">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Lucky Status%></label>
		<div class="cbi-value-field" id="ui-run-status">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Lucky Arch%></label>
		<div class="cbi-value-field" id="ui-arch">
			<span class="lucky-val-text">-</span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Lucky Version%></label>
		<div class="cbi-value-field" id="ui-version">
			<span class="lucky-val-text">-</span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Compilation Time%></label>
		<div class="cbi-value-field" id="ui-compile-time">
			<span class="lucky-val-text">-</span>
		</div>
	</div>
</div>

<div class="cbi-section lucky-status-panel">
	<h3><%:Admin Panel Information%></h3>
	
	<div class="cbi-value">
		<label class="cbi-value-title"><%:Admin Panel%></label>
		<div class="cbi-value-field" id="ui-admin-link-container">
			<span class="lucky-badge secondary"><%:Not available%></span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Admin Panel Login Info%></label>
		<div class="cbi-value-field" id="ui-login-info">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>
	
	<div class="cbi-value">
		<label class="cbi-value-title"><%:Admin Web Port%></label>
		<div class="cbi-value-field" id="ui-http-port">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Safe URL%></label>
		<div class="cbi-value-field" id="ui-safe-url">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>

	<div class="cbi-value">
		<label class="cbi-value-title"><%:Allow Internet Access%></label>
		<div class="cbi-value-field" id="ui-allow-internet">
			<span class="lucky-badge secondary"><%:Collecting data...%></span>
		</div>
	</div>
</div>

<script type="text/javascript">
	var luckyState = {
		installed: false,
		running: false,
		adminUrl: "",
		info: null
	};

	// 辅助更新DOM元素内容
	function updateHTML(id, html) {
		var el = document.getElementById(id);
		if (el) el.innerHTML = html;
	}

	function initDashboard() {
		fetchLuckyInfo();
		monitorLuckyState();
	}

	function renderStatus() {
		// Render Run Status
		var statusHtml = "";
		if (luckyState.running) {
			statusHtml = '<span class="lucky-badge success"><%:The Lucky service is running.%></span>' +
						 '<input type="button" class="btn cbi-button cbi-button-remove" value="<%:Stop%>" onclick="controlService(\'stop\')"/>';
			
			// Render Admin Link when running
			if (luckyState.adminUrl) {
				updateHTML('ui-admin-link-container', '<a class="lucky-admin-link" href="' + luckyState.adminUrl + '" target="_blank">' + luckyState.adminUrl + '</a>');
			}
		} else {
			if (luckyState.installed) {
				statusHtml = '<span class="lucky-badge danger"><%:The Lucky service is not running.%></span>' +
							 '<input type="button" class="btn cbi-button cbi-button-apply" value="<%:Start%>" onclick="controlService(\'start\')"/>';
			} else {
				statusHtml = '<span class="lucky-badge danger"><%:Not installed%></span>';
			}
			updateHTML('ui-admin-link-container', '<span class="lucky-badge danger"><%:Service is stopped%></span>');
		}
		updateHTML('ui-run-status', statusHtml);
	}

	function fetchLuckyInfo() {
		XHR.get('<%=url([[admin]], [[services]], [[lucky_info]])%>', null, function (x, info) {
			if (!info) return;
			
			updateHTML('ui-arch', '<span class="lucky-val-text">' + (info.luckyArch || '-') + '</span>');

			if (!info.luckyInfo || info.luckyInfo === "") {
				luckyState.installed = false;
				var notInstallHtml = '<span class="lucky-badge danger"><%:Not installed%></span>';
				
				updateHTML('ui-install-status', notInstallHtml);
				updateHTML('ui-version', notInstallHtml + '<input type="button" class="btn cbi-button cbi-button-action" value="<%:get latest version%>" onclick="window.open(\'https://release.66666.host/\')"/>');
				updateHTML('ui-compile-time', notInstallHtml);
				updateHTML('ui-login-info', notInstallHtml);
				updateHTML('ui-http-port', notInstallHtml);
				updateHTML('ui-safe-url', notInstallHtml);
				updateHTML('ui-allow-internet', notInstallHtml);
				
				renderStatus();
				return;
			}

			luckyState.installed = true;
			updateHTML('ui-install-status', '<span class="lucky-badge success"><%:Installed%></span>');

			var detail = JSON.parse(info.luckyInfo);
			var conf = info.LuckyBaseConfigure || {};
			luckyState.info = conf;

			updateHTML('ui-compile-time', '<span class="lucky-val-text">' + detail.Date + '</span>');
			updateHTML('ui-version', '<span class="lucky-val-text">' + detail.Version + '</span>' + 
									 '<input type="button" class="btn cbi-button cbi-button-action" value="<%:get latest version%>" onclick="window.open(\'https://release.66666.host/\')"/>');

			// Build Admin URL
			luckyState.adminUrl = window.location.protocol + "//" + window.location.hostname + ":" + (conf.AdminWebListenPort || 16601);
			if (conf.SafeURL) {
				luckyState.adminUrl += conf.SafeURL;
			}

			// Render Settings Forms
			updateHTML('ui-login-info', '<span class="lucky-val-text"><%:DefaultAuth%>: 666</span>' + 
										'<input type="button" class="btn cbi-button cbi-button-reset" value="<%:Reset%>" onclick="resetAuth()"/>');

			updateHTML('ui-http-port', '<input disabled id="_inp_port" type="text" class="cbi-input-text" style="width:100px; margin-right:10px" value="' + (conf.AdminWebListenPort || '') + '"/>' + 
									   '<input type="button" class="btn cbi-button cbi-button-edit" value="<%:Change%>" onclick="changePort()"/>');

			updateHTML('ui-safe-url', '<input disabled id="_inp_safeurl" type="text" class="cbi-input-text" style="width:150px; margin-right:10px" value="' + (conf.SafeURL || '') + '"/>' + 
									  '<input type="button" class="btn cbi-button cbi-button-edit" value="<%:Change%>" onclick="changeSafeUrl()"/>');

			var internetHtml = conf.AllowInternetaccess ? 
				'<span class="lucky-badge success"><%:allow%></span><input type="button" class="btn cbi-button cbi-button-remove" value="<%:Disable%>" onclick="toggleInternet(false)"/>' : 
				'<span class="lucky-badge danger"><%:not allow%></span><input type="button" class="btn cbi-button cbi-button-apply" value="<%:Enable%>" onclick="toggleInternet(true)"/>';
			updateHTML('ui-allow-internet', internetHtml);
			
			renderStatus();
		});
	}

	function monitorLuckyState() {
		XHR.poll(3, '<%=url([[admin]], [[services]], [[lucky_status]])%>', null, function (x, data) {
			if (data) {
				if (luckyState.running !== data.running) {
					luckyState.running = data.running;
					if (luckyState.running) fetchLuckyInfo(); // 如果状态从停止变为运行，刷新一次配置数据
					renderStatus();
				}
			}
		});
	}

	// Interactions
	function submitConfig(key, value) {
		XHR.get('<%=url([[admin]], [[services]], [[lucky_set_config]])%>', { key: key, value: value }, function (x, res) {
			if (res && res.ret == 0) {
				alert("<%:update success%>");
				controlService("restart", true);
			} else {
				alert("<%:update failed%>");
			}
		});
	}

	function controlService(action, skipConfirm) {
		if (!skipConfirm && !confirm("<%:Are you sure to " + action + " lucky service?%>")) return;
		
		XHR.get('<%=url([[admin]], [[services]], [[lucky_service]])%>', { action: action }, function () {
			if (action === "restart") {
				setTimeout(function() { document.location.reload(); }, 2000);
			}
		});
	}

	function changePort() {
		var el = document.getElementById('_inp_port');
		var newPort = prompt("<%:New Admin Web Port%>", el.value);
		if (!newPort || newPort === el.value) return;
		if (!/^\d+$/.test(newPort) || parseInt(newPort) <= 0 || parseInt(newPort) > 65535) {
			alert("<%:portValueError%>");
			return;
		}
		submitConfig("admin_http_port", newPort);
	}

	function changeSafeUrl() {
		var el = document.getElementById('_inp_safeurl');
		var newUrl = prompt("<%:New Safe URL (e.g. /lucky)%>", el.value);
		if (newUrl === null || newUrl === el.value) return;
		submitConfig("admin_safe_url", newUrl);
	}

	function resetAuth() {
		if (confirm("<%:Reset 666 as admin account and password?%>")) {
			submitConfig("reset_auth_info", "");
		}
	}

	function toggleInternet(enable) {
		if (confirm(enable ? "<%:Are you sure Enalbe Internetaccess?%>" : "<%:Are you sure Disable Internetaccess?%>")) {
			submitConfig("switch_Internetaccess", enable ? "true" : "false");
		}
	}

	// Bootstrap
	initDashboard();
</script>
